# render.yaml — Stock Yangu Blueprint

databases:
  - name: stockyangu-db
    plan: free
    region: ohio

services:
  - type: web
    name: stock-yangu
    env: node
    plan: free
    region: ohio
    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: stockyangu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: ""
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
